spring:
  application:
    name: backend
  # 이번 DB 연결 변경: 로컬 MySQL의 woth 스키마를 실제 저장소로 사용합니다.
  datasource:
    url: jdbc:mysql://localhost:3306/woth?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # 개발 중 엔티티에 추가된 컬럼은 자동 반영하지만, 기존 컬럼 삭제는 수동 마이그레이션으로 처리합니다.
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql:
    init:
      # schema.sql/data.sql은 참고용으로 두고, 실행 중 DB 초기화로 기존 데이터를 덮지 않습니다.
      mode: never
